  <text x="410" y="295" text-anchor="middle" font-size="11" fill="#333">Each group of 4 Q heads projects to a unique query but reads from the SAME K/V locker.</text>
  <text x="410" y="310" text-anchor="middle" font-size="11" fill="#333">KV cache size shrinks 4× vs. MHA, while queries remain fully diverse.</text>
