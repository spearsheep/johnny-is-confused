site_name: Johnny is Confused
site_description: Notes and blog posts on machine learning, AI, and whatever else I'm trying to figure out. Not authoritative — just writing it out until I understand it.
site_author: Johnny (Jun Yu Chen)
# TODO: update these two once you create the GitHub repo and enable Pages.
site_url: https://spearsheep.github.io/johnny-is-confused/
repo_name: spearsheep/johnny-is-confused
repo_url: https://github.com/spearsheep/johnny-is-confused
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  palette:
    # light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

nav:
  - Home: index.md
  - Notes:
    - notes/index.md
    - "Llama 3 (Meta, 2024)": notes/llama3.md
  - Blog:
    - blog/index.md
  - Resources:
    - "Study-notes prompt": notes/study-notes-prompt.md

markdown_extensions:
  # Sane defaults
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
      toc_depth: 3
  # Pymdown extensions
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spearsheep
  generator: false  # hide "Made with Material for MkDocs" if you prefer clean footer

copyright: >
  Written by Johnny (Jun Yu Chen) — read freely, share freely,
  please don't resell without asking.
