<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#e74c3c"/></marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2b6cb0"/></marker>
  </defs>
  <rect width="820" height="380" fill="white"/>
  <text x="410" y="22" text-anchor="middle" font-size="15" font-weight="bold">KV cache over three decode steps (one layer, one KV head shown)</text>
  <text x="40" y="80" font-size="12" font-weight="bold">After prefill (t = 5):</text>
  <g>
    <rect x="40" y="92" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="64" y="113" text-anchor="middle" font-size="11">K₀,V₀</text>
    <rect x="88" y="92" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="112" y="113" text-anchor="middle" font-size="11">K₁,V₁</text>
    <rect x="136" y="92" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="160" y="113" text-anchor="middle" font-size="11">K₂,V₂</text>
    <rect x="184" y="92" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="208" y="113" text-anchor="middle" font-size="11">K₃,V₃</text>
    <rect x="232" y="92" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="256" y="113" text-anchor="middle" font-size="11">K₄,V₄</text>
    <rect x="280" y="92" width="48" height="32" fill="#f4f4f5" stroke="#aaa" stroke-dasharray="3 3"/><text x="304" y="113" text-anchor="middle" font-size="11" fill="#aaa">empty</text>
    <rect x="328" y="92" width="48" height="32" fill="#f4f4f5" stroke="#aaa" stroke-dasharray="3 3"/><text x="352" y="113" text-anchor="middle" font-size="11" fill="#aaa">empty</text>
    <rect x="376" y="92" width="48" height="32" fill="#f4f4f5" stroke="#aaa" stroke-dasharray="3 3"/><text x="400" y="113" text-anchor="middle" font-size="11" fill="#aaa">empty</text>
    <text x="430" y="113" font-size="11" fill="#666">...</text>
  </g>
  <text x="40" y="170" font-size="12" font-weight="bold">Decode step for position 5:</text>
  <text x="40" y="188" font-size="11" fill="#333">• Compute Q₅, K₅, V₅ from new token (no cache read needed for Q)</text>
  <text x="40" y="205" font-size="11" fill="#e74c3c">• WRITE: K₅, V₅ into cache[5]</text>
  <text x="40" y="222" font-size="11" fill="#2b6cb0">• READ: cache[0..5] for attention — scores = Q₅ · K₀..₅ᵀ, then · V₀..₅</text>
  <g>
    <rect x="40" y="240" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="64" y="261" text-anchor="middle" font-size="11">K₀,V₀</text>
    <rect x="88" y="240" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="112" y="261" text-anchor="middle" font-size="11">K₁,V₁</text>
    <rect x="136" y="240" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="160" y="261" text-anchor="middle" font-size="11">K₂,V₂</text>
    <rect x="184" y="240" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="208" y="261" text-anchor="middle" font-size="11">K₃,V₃</text>
    <rect x="232" y="240" width="48" height="32" fill="#dbeafe" stroke="#2b6cb0"/><text x="256" y="261" text-anchor="middle" font-size="11">K₄,V₄</text>
    <rect x="280" y="240" width="48" height="32" fill="#fde4e4" stroke="#e74c3c" stroke-width="2"/><text x="304" y="261" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">K₅,V₅</text>
    <rect x="328" y="240" width="48" height="32" fill="#f4f4f5" stroke="#aaa" stroke-dasharray="3 3"/><text x="352" y="261" text-anchor="middle" font-size="11" fill="#aaa">empty</text>
    <path d="M 304 228 L 304 239" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrRed)"/>
    <text x="312" y="234" font-size="10" fill="#e74c3c">write</text>
    <path d="M 40 283 Q 40 295 50 295 L 320 295 Q 328 295 328 283" fill="none" stroke="#2b6cb0" stroke-width="1.5"/>
    <text x="184" y="311" text-anchor="middle" font-size="11" fill="#2b6cb0">read cache[0..5] for attention</text>
  </g>
  <text x="40" y="345" font-size="12" font-weight="bold">Next step (position 6):</text>
  <text x="190" y="345" font-size="11" fill="#333">write K₆,V₆ → cache[6]; read cache[0..6]. Cost per step: O(T·d), not O(T²·d).</text>
</svg>
